name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kove_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      MIX_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/kove_test
      SECRET_KEY_BASE: test_secret_key_base_123
      PHX_SERVER: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17.0'
          otp-version: '26.0'

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mix deps
        run: mix deps.get

      - name: Install Node deps
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build assets
        run: mix assets.deploy

      - name: Compile Phoenix
        run: mix compile

      - name: Setup DB
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Start Phoenix server
        run: |
          mix phx.server &
          sleep 5

      - name: Run Playwright tests
        run: npx playwright test

